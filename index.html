<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>
  
html {
  height:100%;
}
  
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  height:100%; 
}

.topnav {
  overflow: hidden;
  background-color: #110d51;
}

.topnav a {
  float: left;
  display: block;
  color: #f2f2f2;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
  font-size: 17px;
}

.topnav a:hover {
  background-color: #ddd;
  color: black;
}

.topnav a.active {
  background-color: #4d510d;
  color: white;
}

.topnav .icon {
  display: none;
}

@media screen and (max-width: 600px) {
  .topnav a:not(:first-child) {display: none;}
  .topnav a.icon {
    float: right;
    display: block;
  }
}

@media screen and (max-width: 600px) {
  .topnav.responsive {position: relative;}
  .topnav.responsive .icon {
    position: absolute;
    right: 0;
    top: 0;
  }
  .topnav.responsive a {
    float: none;
    display: block;
    text-align: left;
  }
}
</style>
</head>
<body>

<div class="topnav" id="myTopnav">
  <a href="#home" class="active">Home</a>
  <a href="https://www.linkedin.com/in/nathan-crowder"/>LinkedIN</a>
  <a href="#Projects/Code">Projects/Code</a>
  <a href="#Articles">Articles</a>
  <a href="https://raindrop.io/collection/16394404" target="_blank">Data Sources</a>
  <a href="javascript:void(0);" class="icon" onclick="myFunction()">
    <i class="fa fa-bars"></i>
  </a>
</div>

<div style="padding-left:16px">
   <!-- <object data="https://ncrowder.github.io/resources/Resume(nathan-crowder).pdf" type="application/pdf" style="min-height:100vh;width:100%">
   </object> -->
   <iframe src="https://ncrowder.github.io/resources/Resume(nathan-crowder).pdf" height="100vh" width="100%">
   </object> -->
</div>

<script>
function myFunction() {
  var x = document.getElementById("myTopnav");
  if (x.className === "topnav") {
    x.className += " responsive";
  } else {
    x.className = "topnav";
  }
}
</script>

</body>
</html>
